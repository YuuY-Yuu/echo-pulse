<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo Pulse - Ultimate Mobile Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #hud { padding: 20px; display: none; flex-direction: column; gap: 10px; position: relative; }
        .energy-container { width: 180px; height: 4px; background: rgba(255,255,255,0.1); }
        #energy-bar { height: 100%; width: 100%; background: #00dcff; box-shadow: 0 0 10px #00dcff; transition: width 0.1s linear; }

        /* 手機按鈕 */
        #mobile-controls { position: absolute; bottom: 30px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; z-index: 20; }
        .v-pad, .v-actions { display: flex; pointer-events: auto; }
        .v-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; }
        .v-btn { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(0, 220, 255, 0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #00dcff; font-weight: bold; user-select: none; -webkit-tap-highlight-color: transparent; font-size: 20px; }
        .v-btn:active { background: rgba(0, 220, 255, 0.3); transform: scale(0.9); }
        .v-up { grid-area: up; } .v-down { grid-area: down; } .v-left { grid-area: left; } .v-right { grid-area: right; }
        .v-actions { flex-direction: column; gap: 15px; justify-content: center; }
        .btn-pulse { width: 80px; height: 80px; border: 2px solid #00dcff; background: rgba(0,220,255,0.1); }
        .btn-sprint { width: 70px; height: 70px; border-color: #ff3333; color: #ff3333; font-size: 12px; }

        .fullscreen-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; z-index: 30; transition: opacity 0.5s; }
        .fullscreen-screen.visible { opacity: 1; pointer-events: auto; }
        .fullscreen-screen.white-theme { background-color: #fff; }
        .fullscreen-screen.white-theme * { color: #000 !important; border-color: #000 !important; }
        .main-title { font-size: 48px; letter-spacing: 10px; color: #fff; margin-bottom: 20px; text-align: center; }
        .sub-text { color: rgba(255,255,255,0.6); text-align: center; margin-bottom: 40px; font-family: 'Microsoft JhengHei'; line-height: 1.6; }
        .action-btn { padding: 12px 40px; background: transparent; border: 1px solid #fff; color: #fff; font-size: 18px; cursor: pointer; letter-spacing: 3px; }

        #level-display-container { position: absolute; top: 30px; width: 100%; text-align: center; display: none; }
        #level-display { color: #fff; font-size: 24px; letter-spacing: 5px; font-weight: bold; }
        #level-subtitle { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 5px; opacity: 0; transition: opacity 1.5s; font-family: 'Microsoft JhengHei'; }
        .fade-in { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="hud">
            <h1 style="color: rgba(255,255,255,0.5); font-size: 14px; margin: 0;">ECHO PULSE</h1>
            <div class="energy-container"><div id="energy-bar"></div></div>
        </div>
        <div id="level-display-container">
            <div id="level-display"></div>
            <div id="level-subtitle"></div>
        </div>
        <div id="mobile-controls">
            <div class="v-pad">
                <div class="v-btn v-up" data-key="w">▲</div>
                <div class="v-btn v-left" data-key="a">◀</div>
                <div class="v-btn v-right" data-key="d">▶</div>
                <div class="v-btn v-down" data-key="s">▼</div>
            </div>
            <div class="v-actions">
                <div class="v-btn btn-pulse" id="touch-pulse">PULSE</div>
                <div class="v-btn btn-sprint" id="touch-sprint">SHIFT</div>
            </div>
        </div>
    </div>

    <div id="start-screen" class="fullscreen-screen visible">
        <h1 class="main-title">ECHO PULSE</h1>
        <p class="sub-text">在黑暗中生存<br>逃離獵手的追捕</p>
        <button class="action-btn" onclick="showStory()">INITIALIZE</button>
    </div>

    <div id="story-screen" class="fullscreen-screen">
        <h2 style="color:#00dcff; letter-spacing:5px;">深淵感知實驗室</h2>
        <p class="sub-text" style="max-width: 80%;">
            這裡沒有光，唯有聲波能讓你『看見』世界。<br><br>
            [注意] 獵人會被聲音吸引，也會感應你的氣味。
        </p>
        <button class="action-btn" onclick="startGame()">進入深淵</button>
    </div>

    <div id="game-over-screen" class="fullscreen-screen">
        <h2 id="result-title" class="main-title"></h2>
        <button class="action-btn" onclick="handleResultAction()">RESTART</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const energyBarElement = document.getElementById('energy-bar');
const hudElement = document.getElementById('hud');
const levelContainer = document.getElementById('level-display-container');
const levelDisplay = document.getElementById('level-display');
const levelSubtitle = document.getElementById('level-subtitle');
const startScreen = document.getElementById('start-screen');
const storyScreen = document.getElementById('story-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const resultTitle = document.getElementById('result-title');

let gameState = 'start', currentLevel = 1, MAX_LEVEL = 5;
let introTime = 0, lastTime = 0;
const levelNarrativesCN = { 1: "淵面深處，有物窺伺。", 2: "沉默，是你唯一的護盾。", 3: "牠們正在學習你的律動。", 4: "能源即將枯竭，不要停下。", 5: "前方即是微光，跑！" };
const player = { x: 0, y: 0, radius: 8, speed: 4.2, energy: 100, maxEnergy: 100, energyCost: 15 };
const keys = { w: false, a: false, s: false, d: false, shift: false };
const walls = [], echoPoints = [], waves = [], stalkers = [], footsteps = [];
const goal = { x: 0, y: 0, radius: 30, revealBrightness: 0 };

function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function getDistance(x1, y1, x2, y2) { return Math.sqrt((x2 - x1)**2 + (y2 - y1)**2); }
function checkCollision(pX, pY, radius, wall) { return (pX - radius < wall.x + wall.w && pX + radius > wall.x && pY - radius < wall.y + wall.h && pY + radius > wall.y); }

class Stalker {
    constructor(x, y) {
        this.x = x; this.y = y; this.radius = 8; this.vx = 0; this.vy = 0;
        this.speedIdle = 1.6; this.state = 'idle'; this.targetX = x; this.targetY = y;
        this.revealBrightness = 0; this.startupTimer = 1.5;
    }
    update(deltaTime) {
        if (this.startupTimer > 0) { this.startupTimer -= deltaTime; return; }
        const dist = getDistance(this.x, this.y, player.x, player.y);
        let speed = dist < 150 ? 2.5 : 1.6;
        let dx = (dist < 150 ? player.x : this.targetX) - this.x, dy = (dist < 150 ? player.y : this.targetY) - this.y;
        let d = Math.sqrt(dx*dx + dy*dy);
        if(d > speed) { this.vx = (dx/d)*speed; this.vy = (dy/d)*speed; }
        this.x += this.vx; this.y += this.vy;
        if(this.revealBrightness > 0) this.revealBrightness -= 0.01;
    }
    draw(ctx) {
        if(this.revealBrightness <= 0 && this.startupTimer <= 0) return;
        ctx.fillStyle = `rgba(255, 50, 50, ${this.startupTimer > 0 ? 1 : this.revealBrightness})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
    }
}

function generateMap() {
    walls.length = 0; echoPoints.length = 0; waves.length = 0; stalkers.length = 0;
    const cw = canvas.width, ch = canvas.height;
    player.x = 100; player.y = ch - 100;
    goal.x = getRandomInt(100, cw - 100); goal.y = getRandomInt(100, ch - 100);
    walls.push({x:0, y:0, w:cw, h:10}, {x:0, y:ch-10, w:cw, h:10}, {x:0, y:0, w:10, h:ch}, {x:cw-10, y:0, w:10, h:ch});
    for(let i=0; i<10 + currentLevel*2; i++) {
        let w = getRandomInt(60, 150), h = getRandomInt(60, 150), x = getRandomInt(50, cw-150), y = getRandomInt(50, ch-150);
        walls.push({x, y, w, h});
    }
    for(let i=0; i<currentLevel; i++) stalkers.push(new Stalker(getRandomInt(100, cw-100), getRandomInt(100, ch-100)));
    walls.forEach(w => {
        for(let x=w.x; x<=w.x+w.w; x+=10) echoPoints.push({x, y:w.y, b:0}, {x, y:w.y+w.h, b:0});
        for(let y=w.y; y<=w.y+w.h; y+=10) echoPoints.push({x:w.x, y, b:0}, {x:w.x+w.w, y, b:0});
    });
}

function fireWave() {
    if(player.energy >= player.energyCost) {
        player.energy -= player.energyCost;
        waves.push({ x: player.x, y: player.y, radius: player.radius, speed: 10, maxRadius: 250 });
    }
}

function bindTouchControls() {
    document.getElementById('mobile-controls').style.display = 'flex';
    document.querySelectorAll('.v-btn[data-key]').forEach(btn => {
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[btn.dataset.key] = true; });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[btn.dataset.key] = false; });
    });
    document.getElementById('touch-pulse').addEventListener('touchstart', (e) => { e.preventDefault(); fireWave(); });
    document.getElementById('touch-sprint').addEventListener('touchstart', (e) => { e.preventDefault(); keys.shift = true; });
    document.getElementById('touch-sprint').addEventListener('touchend', (e) => { e.preventDefault(); keys.shift = false; });
}

window.showStory = () => { startScreen.classList.remove('visible'); storyScreen.classList.add('visible'); };
window.startGame = () => { storyScreen.classList.remove('visible'); generateMap(); gameState = 'level_intro'; introTime = 0; hudElement.style.display = 'flex'; levelContainer.style.display = 'block'; bindTouchControls(); };
window.handleResultAction = () => { gameOverScreen.classList.remove('visible'); if(gameState === 'lost') currentLevel = 1; else currentLevel++; generateMap(); gameState = 'level_intro'; introTime = 0; };

function update(deltaTime) {
    if(gameState === 'level_intro') {
        introTime += deltaTime;
        levelDisplay.textContent = `LEVEL ${currentLevel}`;
        levelSubtitle.textContent = levelNarrativesCN[currentLevel];
        if(introTime > 1.5) levelSubtitle.classList.add('fade-in');
        if(introTime > 4) { gameState = 'playing'; levelSubtitle.classList.remove('fade-in'); }
        return;
    }
    if(gameState !== 'playing') return;

    let speed = keys.shift ? player.speed * 1.6 : player.speed;
    if(keys.shift && player.energy > 0) player.energy -= 0.5; else if(player.energy < 100) player.energy += 0.2;
    energyBarElement.style.width = `${player.energy}%`;

    if(keys.w) player.y -= speed; if(keys.s) player.y += speed; if(keys.a) player.x -= speed; if(keys.d) player.x += speed;
    
    waves.forEach((w, i) => {
        w.radius += w.speed;
        echoPoints.forEach(p => { if(Math.abs(getDistance(w.x, w.y, p.x, p.y) - w.radius) < 10) p.b = 1.0; });
        stalkers.forEach(s => { if(getDistance(w.x, w.y, s.x, s.y) < w.radius) s.revealBrightness = 1.0; });
        if(w.radius > w.maxRadius) waves.splice(i, 1);
    });

    echoPoints.forEach(p => { if(p.b > 0) p.b -= 0.01; });
    stalkers.forEach(s => { 
        s.update(deltaTime); 
        if(getDistance(player.x, player.y, s.x, s.y) < 15) { gameState = 'lost'; resultTitle.textContent = "YOU DIED"; gameOverScreen.classList.add('visible'); }
    });
    
    if(getDistance(player.x, player.y, goal.x, goal.y) < 30) {
        if(currentLevel >= MAX_LEVEL) { gameState = 'win'; resultTitle.textContent = "SUCCESS"; gameOverScreen.classList.add('white-theme', 'visible'); }
        else { gameState = 'clear'; resultTitle.textContent = "CLEAR"; gameOverScreen.classList.add('visible'); }
    }
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if(gameState === 'level_intro') {
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.textAlign='center'; ctx.font="20px Arial"; ctx.fillText(levelNarrativesCN[currentLevel], canvas.width/2, canvas.height/2);
    }
    echoPoints.forEach(p => { if(p.b > 0) { ctx.fillStyle = `rgba(0, 220, 255, ${p.b})`; ctx.fillRect(p.x, p.y, 2, 2); } });
    stalkers.forEach(s => s.draw(ctx));
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
    waves.forEach(w => { ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.arc(w.x, w.y, w.radius, 0, Math.PI*2); ctx.stroke(); });
}

function loop(time) {
    if (!lastTime) lastTime = time;
    update((time - lastTime) / 1000);
    draw();
    lastTime = time;
    requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
requestAnimationFrame(loop);

window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; if(e.code==='Space') fireWave(); });
window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
</script>
</body>
</html>
